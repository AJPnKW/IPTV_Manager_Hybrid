name: Deploy GitHub Pages

"on":
  push:
    branches:
      - main
    paths:
      - web/**
      - index.html
      - .nojekyll
      - .github/workflows/deploy_pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          cp -R web _site/web

          if [ -f index.html ]; then
            cp index.html _site/index.html
          else
            cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>IPTV Manager Hybrid</title>
          </head>
          <body>
            <h1>IPTV Manager Hybrid</h1>
            <p><a href="web/feeds/">Open SmartCDN feed files</a></p>
          </body>
          </html>
          HTML
          fi

          touch _site/.nojekyll

          test -s _site/web/feeds/smartcdn.m3u
          test -s _site/web/feeds/smartcdn.m3u8
          test -s _site/web/feeds/smartcdn.xml
          test -s _site/web/feeds/index.html

          echo "Pages artifact prepared."

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy static Pages artifact
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
